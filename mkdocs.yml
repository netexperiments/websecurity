site_name: Hackergram Lab
site_url: https://netexperiments.github.io/websecurity/

theme:
  name: material
  favicon: assets/favicon.jpg
  logo: assets/favicon.jpg
  palette:
    scheme: slate  
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - navigation.indexes
    - navigation.expand
    - navigation.tabs.sticky
nav:
  - Hackergram Overview: labs/hackergram.md
  - Laboratory Setup: 
    - Lab Setup: labs/attacks/lab-setup.md
  - Web Security Experiments:
    - Web Security Attacks:
      - Parser-Driven Injections:
        - SQL Injection: labs/attacks/sqli.md
        - NoSQL Injection: labs/attacks/nosqli.md
        - XXE Injection: labs/attacks/xxe.md
      - Interpreter-Driven Injections:
        - Cross-Site Scripting (XSS): labs/attacks/xss.md
        - LLM-mediated SQL Injection: labs/attacks/llm-mediated-sqli.md
        - LLM-mediated Stored XSS: labs/attacks/llm-mediated-stored-xss.md
        - Indirect Prompt Injection: labs/attacks/indirect-prompt-injection.md
        - System Prompt Leakage: labs/attacks/system-prompt-leakage.md
      - Access & Resource Control:
        - Path Traversal: labs/attacks/path-traversal.md
      - Request & Interaction Forgery:
        - Cross-Site Request Forgery (CSRF): labs/attacks/csrf.md
        - Clickjacking: labs/attacks/clickjacking.md
        - Server-Side Request Forgery (SSRF): labs/attacks/ssrf.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences    
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption