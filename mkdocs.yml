site_name: Hackergram Lab
site_url: https://mydomain.org/netexperiments/websecurity

theme:
  name: material
  favicon: assets/favicon.jpg
  logo: assets/favicon.jpg
  palette:
    scheme: slate  
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - navigation.indexes
    - navigation.expand
    - navigation.tabs.sticky
nav:
  - The Hackergram Web Application: labs/hackergram.md
  - Laboratory Setup: labs/attacks/lab-setup.md
  - "": ""
  - Practical Attacks and Mitigation:
    - Web Security Attacks:
      - Injection attacks:
        - SQL Injection: labs/attacks/sqli.md
        - NoSQL Injection: labs/attacks/nosqli.md
        - Cross-Site Scripting:
          - Stored XSS: labs/attacks/stored-xss.md
          - Reflected XSS: labs/attacks/reflected-xss.md
          - XSS Worm: labs/attacks/xss-worm.md
          - XSS Countermeasure: labs/attacks/xss-countermeasure.md
      - "": ""
      - "": ""
      - "": ""
      - Request Forgery Attacks:
        - Cross-Site Request Forgery: labs/attacks/csrf.md
        - Server Side Request Forgery: labs/attacks/ssrf.md
      - "": ""
      - "": ""
      - "": ""
      - Access and Resource Exploitation:
        - Path traversal: labs/attacks/path-traversal.md
        - Clickjacking: labs/attacks/clickjacking.md
      - "": ""
      - "": ""
      - "": ""
      - LLM Vulnerabilities in Web Contexts:
        - Prompt Injection: labs/attacks/prompt-injection.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences    
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption